name: School Reports Automation

on:
  schedule:
    - cron: '0 8 1 */2 *'
  workflow_dispatch:
    inputs:
      province:
        description: 'Province'
        required: false
        default: 'Sindh'
        type: choice
        options:
          - Sindh
          - Punjab
          - KPK
          - Balochistan
          - Islamabad Capital Territory
          - Gilgit-Baltistan
          - AJK
      district:
        description: 'District(s): one district to drill down everywhere (e.g. Hyderabad), or comma-separated to control breakdown tables only (e.g. Lahore,Rawalpindi,Faisalabad). Leave blank for all.'
        required: false
        default: ''
        type: string
      institute:
        description: >-
          Institute to filter by. Leave blank for all institutes of the selected province.
          Sindh: SELD, FGEI, SEF, Private, Non-Profit |
          Punjab: SED-Punjab, PEF, Non-Profit, FGEI, FDE, Private |
          KPK: ESED-KP, FGEI, Private |
          Balochistan: FGEI, SED-Balochistan |
          ICT: FDE | GB: ESED-GB, Private | AJK: ESED-GB, FGEI
        required: false
        default: ''
        type: choice
        options:
          - ''
          - SELD
          - SEF
          - FGEI
          - FDE
          - Non-Profit
          - Private
          - SED-Punjab
          - PEF
          - ESED-KP
          - SED-Balochistan
          - ESED-GB
      date_from:
        description: 'Date From (MM/DD/YYYY)'
        required: false
        default: '12/01/2025'
        type: string
      date_to:
        description: 'Date To (MM/DD/YYYY)'
        required: false
        default: '01/31/2026'
        type: string
      active_schools_criteria:
        description: 'Active Schools: count by'
        required: false
        default: 'Submitted Activities'
        type: choice
        options:
          - Submitted Activities
          - Approved Activities
      active_schools_threshold:
        description: 'Active Schools: minimum activity count (default 2)'
        required: false
        default: '2'
        type: string
      sheet_id:
        description: 'Google Sheet ID (leave blank for default)'
        required: false
        default: ''
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get week number
        id: week
        run: echo "week=$(date +%V)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: schools_cache.json
          key: schools-cache-${{ steps.week.outputs.week }}
          restore-keys: schools-cache-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          PARAM_PROVINCE:          ${{ inputs.province }}
          PARAM_DISTRICT:          ${{ inputs.district }}
          PARAM_INSTITUTE:         ${{ inputs.institute }}
          PARAM_DATE_FROM:         ${{ inputs.date_from }}
          PARAM_DATE_TO:           ${{ inputs.date_to }}
          PARAM_ACTIVE_CRITERIA:   ${{ inputs.active_schools_criteria }}
          PARAM_ACTIVE_THRESHOLD:  ${{ inputs.active_schools_threshold }}
          PARAM_SHEET_ID:          ${{ inputs.sheet_id }}
